<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Музычка</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0f172a;
            /* Фон с градиентом для красоты стекла */
            background-image: 
                radial-gradient(circle at 15% 15%, #4f46e5 0%, transparent 25%),
                radial-gradient(circle at 85% 85%, #db2777 0%, transparent 25%);
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        .player-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 50px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
            transition: transform 0.2s ease;
            cursor: grab;
        }

        .player-card:active {
            cursor: grabbing;
        }

        .player-card::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4, #45b7d1, #96ceb4, #ffeaa7, #dda0dd);
            border-radius: 32px;
            z-index: -1;
            opacity: 0;
            transition: all 0.2s ease;
        }

        .player-card.pressed {
            transform: translateY(5px);
        }

        h1 {
            color: white;
            font-size: 1.2rem;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 3px;
            opacity: 0.8;
        }

        /* Стеклянная кнопка */
        .glass-btn {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            position: relative;
            outline: none;
        }

        /* Иконка Play (треугольник) */
        .icon {
            width: 0;
            height: 0;
            border-top: 15px solid transparent;
            border-bottom: 15px solid transparent;
            border-left: 25px solid white;
            margin-left: 8px;
            transition: 0.3s;
        }

        /* Класс для изменения иконки на паузу */
        .is-playing .icon {
            border: none;
            width: 20px;
            height: 30px;
            border-left: 6px solid white;
            border-right: 6px solid white;
            margin-left: 0;
        }

        .glass-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
            border-color: rgba(255, 255, 255, 0.4);
        }

        .glass-btn:active {
            transform: scale(0.9);
            box-shadow: inset 0 5px 10px rgba(0,0,0,0.4);
        }

        .button-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 18px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .artist-label {
            color: rgba(255, 255, 255, 0.85);
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 0.03em;
        }

        /* Анимация свечения при игре */
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.2); }
            70% { box-shadow: 0 0 0 30px rgba(255, 255, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0); }
        }

        .active-pulse {
            animation: pulse 2s infinite;
            border-color: rgba(255, 255, 255, 0.6);
        }

        #status {
            color: rgba(255, 255, 255, 0.5);
            margin-top: 20px;
            font-size: 0.8rem;
        }

        .progress-container {
            width: 260px;
            height: 10px;
            margin: 20px auto 0;
            background: rgba(255, 255, 255, 0.12);
            border-radius: 999px;
            overflow: hidden;
            cursor: pointer;
            position: relative;
        }

        .progress-filled {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #8b5cf6, #ec4899);
            transition: width 0.1s linear;
        }

        .progress-time {
            margin-top: 12px;
            color: rgba(255, 255, 255, 0.55);
            font-size: 0.75rem;
        }
    </style>
</head>
<body>

    <div class="player-card">
        <h1>Музычка</h1>
            <p id="trackName" style="color: rgba(255, 255, 255, 0.7); font-size: 0.9rem; margin-bottom: 20px;">BandLab Song</p>
            <button class="glass-btn" id="mainButton">
                <div class="icon" id="btnIcon"></div>
            </button>
            <span class="artist-label">твой любимый артист</span>
        </div>

        <p id="status">Нажми, чтобы послушать</p>
        <div class="progress-container" id="progressContainer">
            <div class="progress-filled" id="progressFilled"></div>
        </div>
        <p class="progress-time" id="progressTime">00:00 / 00:00</p>
    </div>

    <audio id="audioTrack">
        <source src="BandLabSong.mp3" type="audio/mpeg">
    </audio>

    <script>
        const btn = document.getElementById('mainButton');
        const audio = document.getElementById('audioTrack');
        const status = document.getElementById('status');
        const playerCard = document.querySelector('.player-card');

        playerCard.addEventListener('click', () => {
            console.log('Квадрат нажат');
            playerCard.classList.add('pressed');
            setTimeout(() => playerCard.classList.remove('pressed'), 150);
        });

        const progressContainer = document.getElementById('progressContainer');
        const progressFilled = document.getElementById('progressFilled');
        const progressTime = document.getElementById('progressTime');

        btn.addEventListener('click', (e) => {
            e.stopPropagation(); // Предотвращаем срабатывание на player-card
            console.log('Кнопка нажата');

            if (audio.paused) {
                audio.play().catch(err => console.log('Ошибка воспроизведения:', err));
                btn.classList.add('is-playing', 'active-pulse');
                status.innerText = "Сейчас играет...";
                playerCard.classList.add('animated-border');
            } else {
                audio.pause();
                btn.classList.remove('is-playing', 'active-pulse');
                status.innerText = "Пауза";
                playerCard.classList.remove('animated-border');
            }
        });

        function updateProgress() {
            const percent = audio.duration ? (audio.currentTime / audio.duration) * 100 : 0;
            progressFilled.style.width = `${percent}%`;
            progressTime.innerText = `${formatTime(audio.currentTime)} / ${formatTime(audio.duration || 0)}`;
        }

        function setProgress(event) {
            const rect = progressContainer.getBoundingClientRect();
            const clickX = event.clientX - rect.left;
            const percentage = Math.max(0, Math.min(clickX / rect.width, 1));
            audio.currentTime = percentage * audio.duration;
        }

        progressContainer.addEventListener('click', (event) => {
            if (!audio.duration) return;
            setProgress(event);
        });

        let isScrubbing = false;
        progressContainer.addEventListener('mousedown', () => { isScrubbing = true; });
        document.addEventListener('mouseup', () => { isScrubbing = false; });
        document.addEventListener('mousemove', (event) => {
            if (!isScrubbing || !audio.duration) return;
            setProgress(event);
        });

        audio.addEventListener('timeupdate', updateProgress);
        audio.addEventListener('loadedmetadata', updateProgress);

        audio.onended = () => {
            btn.classList.remove('is-playing', 'active-pulse');
            status.innerText = "Завершено";
            playerCard.classList.remove('animated-border');
            updateProgress();
        };
    </script>

</body>
</html>
