<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tap Test</title>
    <style>
        body {
            background: #0f172a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            overflow: hidden;
            transition: background-color 0.4s;
            /* 2. ЗАПРЕТ ВЫДЕЛЕНИЯ: Чтобы текст не синел при тапах */
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        #score { 
            font-size: 80px; 
            font-weight: bold; 
            margin-bottom: 10px;
        }

        #message {
            height: 80px;
            margin-bottom: 20px;
            font-weight: 900;
            font-size: 1.4rem;
            text-transform: uppercase;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            opacity: 0;
        }

        /* Анимации нагнетания */
        .float-move { animation: float 2s ease-in-out infinite; }
        .zoom-move { animation: zoom 0.6s ease-in-out infinite alternate; }
        .glitch-move { animation: glitch 0.2s steps(2) infinite; }

        @keyframes float { 0%, 100% { transform: translateX(-10px); } 50% { transform: translateX(10px); } }
        @keyframes zoom { from { transform: scale(1); } to { transform: scale(1.2); } }
        @keyframes glitch {
            0% { transform: translate(0); color: #ff0000; }
            50% { transform: translate(5px, -5px); color: #00ffcc; }
            100% { transform: translate(0); }
        }

        /* Кнопка ТАП */
        .game-btn {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            outline: none;
            transition: transform 0.05s;
            /* 3. ОПТИМИЗАЦИЯ ТАПА: Убирает задержку в 300мс */
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        .game-btn:active { transform: scale(0.9); }

        /* Финальное окно */
        #win-modal {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            max-width: 350px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            text-align: center;
            z-index: 100;
        }

        #restart-btn {
            display: none;
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: rgba(255, 255, 255, 0.4);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 0.8rem;
        }

        .win-party { animation: party 0.4s infinite !important; }
        @keyframes party { 
            0% { background: #450a0a; } 
            50% { background: #064e3b; } 
            100% { background: #1e3a8a; } 
        }
    </style>
</head>
<body>

    <div id="score">0</div>
    <div id="message"></div>
    
    <button class="game-btn" id="tapBtn">TAP!</button>

    <div id="win-modal">
        <h2 style="color: #00ffcc;">Поздравляю!!</h2>
        <p>Это было бесполезно, но спасибо за тест, люблю тебя !</p>
    </div>

    <button id="restart-btn" onclick="location.reload()">Начать заново</button>

    <script>
        let count = 0;
        const scoreDisp = document.getElementById('score');
        const msgDisp = document.getElementById('message');
        const modal = document.getElementById('win-modal');
        const restart = document.getElementById('restart-btn');
        const tapBtn = document.getElementById('tapBtn');

        function addPoint() {
            if (count >= 100) return;
            count++;
            scoreDisp.innerText = count;
            
            // Прогрессия фраз
            if (count === 15) { 
                msgDisp.innerText = "Маловато, давай еще больше !"; 
                msgDisp.style.opacity = "1";
                msgDisp.className = "float-move";
            } 
            else if (count === 30) { 
                msgDisp.innerText = "ЕЩЕ ДАВАЙ ЕЩЕЕЕЕЕ"; 
                msgDisp.className = "zoom-move";
                msgDisp.style.color = "#f87171";
            }
            else if (count === 50) { 
                msgDisp.innerText = "БОЛЬШЕ БОЛЬШЕЕЕЕЕЕЕЕ"; 
                msgDisp.className = "glitch-move";
            }
            else if (count === 70) { 
                msgDisp.innerText = "ЕЩЕ НЕМНОГО!!!!!"; 
                msgDisp.style.color = "#3b82f6";
            }
            else if (count === 90) { 
                msgDisp.style.opacity = "0"; 
            }

            if (count === 100) {
                modal.style.display = 'block';
                restart.style.display = 'block';
                tapBtn.style.display = 'none';
                document.body.classList.add('win-party');
            }
        }

        // 4. ГИБРИДНОЕ УПРАВЛЕНИЕ: Мгновенно для пальцев и мышки
        tapBtn.addEventListener('touchstart', function(e) {
            e.preventDefault(); // Убирает системный зум и задержку
            addPoint();
        }, { passive: false });

        tapBtn.addEventListener('mousedown', function(e) {
            // Чтобы не срабатывало дважды на устройствах с тачем и мышкой
            if (e.which === 1) addPoint(); 
        });
    </script>
</body>
</html>
